<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>LEAP 英単語学習</title>
<style>
:root{
  --bg:#f5fbf6;
  --card:#ffffff;
  --card2:#eef8ef;
  --text:#18311f;
  --muted:#5d7464;
  --green:#31c15f;
  --green2:#1fa64b;
  --green3:#dff7e7;
  --yellow:#ffd166;
  --red:#ff6b6b;
  --blue:#4d8af0;
  --shadow:0 18px 50px rgba(24,49,31,.12);
  --radius:24px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(49,193,95,.15), transparent 35%),
    radial-gradient(circle at top right, rgba(77,138,240,.10), transparent 30%),
    linear-gradient(180deg,#f7fcf8 0%, #eef9f0 100%);
  color:var(--text);
}
button,input{font:inherit}
.app{
  min-height:100%;
  display:flex;
  flex-direction:column;
}
.topbar{
  padding:16px 14px 10px;
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter: blur(16px);
  background: rgba(245,251,246,.78);
  border-bottom:1px solid rgba(24,49,31,.08);
}
.brand{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.brand .title{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.brand h1{
  margin:0;
  font-size:18px;
  line-height:1.15;
  letter-spacing:.02em;
}
.brand .sub{
  font-size:12px;
  color:var(--muted);
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid rgba(49,193,95,.24);
  background:#fff;
  color:var(--green2);
  padding:8px 10px;
  border-radius:999px;
  font-size:12px;
  box-shadow:0 6px 20px rgba(49,193,95,.08);
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:8px;
  margin:10px 0 12px;
}
.stat{
  background:rgba(255,255,255,.8);
  border:1px solid rgba(24,49,31,.06);
  border-radius:18px;
  padding:10px 10px 9px;
  box-shadow:0 10px 24px rgba(24,49,31,.05);
}
.stat .k{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat .v{font-size:16px;font-weight:800}
.progressWrap{
  background:rgba(255,255,255,.75);
  border:1px solid rgba(24,49,31,.06);
  border-radius:999px;
  overflow:hidden;
  height:14px;
  box-shadow:0 10px 20px rgba(24,49,31,.05) inset;
}
.progressBar{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--green),#67e48c);
  transition:width .35s ease;
}
.tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  padding-bottom:2px;
}
.tab{
  border:none;
  border-radius:999px;
  padding:11px 14px;
  background:#fff;
  color:var(--muted);
  box-shadow:0 8px 18px rgba(24,49,31,.06);
  border:1px solid rgba(24,49,31,.05);
  white-space:nowrap;
  font-weight:700;
}
.tab.active{
  background:linear-gradient(180deg,#45d96f,#25b94e);
  color:#fff;
}
.main{
  width:min(1100px,100%);
  margin:0 auto;
  padding:14px 14px 28px;
  flex:1;
}
.grid{
  display:grid;
  grid-template-columns:1.4fr .9fr;
  gap:14px;
}
.panel{
  background:rgba(255,255,255,.75);
  border:1px solid rgba(24,49,31,.07);
  border-radius:28px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.panelHead{
  padding:16px 18px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.panelHead h2{
  margin:0;
  font-size:18px;
}
.panelHead .desc{
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
}
.panelBody{padding:0 18px 18px}
.card{
  background:linear-gradient(180deg,#fff,#fbfefa);
  border:1px solid rgba(24,49,31,.07);
  border-radius:28px;
  padding:18px;
  box-shadow:0 16px 36px rgba(24,49,31,.07);
}
.wordNo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.noTag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 11px;
  border-radius:999px;
  background:var(--green3);
  color:var(--green2);
  font-weight:800;
  font-size:12px;
}
.mini{
  color:var(--muted);
  font-size:12px;
}
.word{
  font-size:42px;
  font-weight:900;
  letter-spacing:.01em;
  margin:6px 0 8px;
  line-height:1.05;
  word-break:break-word;
}
.meaning{
  font-size:18px;
  line-height:1.55;
  color:#26412f;
  margin:0 0 12px;
}
.metaRow{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 10px;
  background:#f2f8f3;
  border:1px solid rgba(24,49,31,.06);
  border-radius:999px;
  color:#2f4c39;
  font-size:12px;
  font-weight:700;
}
.exampleBox{
  border-radius:22px;
  background:linear-gradient(180deg,#effaf2,#fff);
  border:1px solid rgba(49,193,95,.12);
  padding:14px 14px 13px;
  margin-bottom:14px;
}
.exampleBox .label{font-size:11px;color:var(--green2);font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.exampleBox .ex{font-size:15px;line-height:1.55;color:#294337}
.actions{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.actions.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.btn{
  border:none;
  border-radius:18px;
  padding:14px 14px;
  font-weight:800;
  cursor:pointer;
  transition:transform .08s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
  box-shadow:0 10px 20px rgba(24,49,31,.07);
}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.primary{background:linear-gradient(180deg,#45d96f,#25b94e);color:#fff}
.btn.secondary{background:#fff;color:#23402d;border:1px solid rgba(24,49,31,.08)}
.btn.warn{background:#fff5f5;color:#d74c4c;border:1px solid rgba(255,107,107,.18)}
.btn.info{background:#f0f6ff;color:#2c64ce;border:1px solid rgba(77,138,240,.18)}
.btn.small{padding:10px 12px;border-radius:14px;font-size:13px}
.choices{
  display:grid;
  gap:10px;
}
.choice{
  border:none;
  text-align:left;
  background:#fff;
  border-radius:20px;
  padding:14px 14px;
  font-weight:700;
  box-shadow:0 10px 20px rgba(24,49,31,.07);
  border:1px solid rgba(24,49,31,.07);
  cursor:pointer;
}
.choice.correct{
  background:#e8fff0;
  border-color:rgba(49,193,95,.35);
}
.choice.wrong{
  background:#fff0f0;
  border-color:rgba(255,107,107,.35);
}
.sideList{
  display:grid;
  gap:10px;
}
.listItem{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  padding:13px 14px;
  border-radius:18px;
  background:#fff;
  border:1px solid rgba(24,49,31,.06);
}
.listItem .l1{font-weight:800}
.listItem .l2{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45}
.rank{
  min-width:34px;
  height:34px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:#eff9f1;
  color:var(--green2);
  font-weight:900;
}
.notice{
  padding:14px 16px;
  border-radius:20px;
  background:linear-gradient(180deg,#f7fff9,#f2fbf3);
  border:1px solid rgba(49,193,95,.14);
  color:#2d4b36;
  font-size:13px;
  line-height:1.6;
}
.footerBar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}
.answerFlash{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  pointer-events:none;
  z-index:30;
}
.answerFlash .mark{
  width:120px;
  height:120px;
  border-radius:999px;
  display:grid;
  place-items:center;
  font-size:68px;
  font-weight:900;
  color:#fff;
  opacity:0;
  transform:scale(.7);
}
.answerFlash.show .mark{
  animation:pop .7s ease;
}
.answerFlash.correct .mark{background:rgba(49,193,95,.95)}
.answerFlash.wrong .mark{background:rgba(255,107,107,.95)}
@keyframes pop{
  0%{opacity:0;transform:scale(.55)}
  25%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.15)}
}
.shake{animation:shake .35s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.pulse{animation:pulse .6s ease}
@keyframes pulse{
  0%{transform:scale(.98)}
  50%{transform:scale(1.02)}
  100%{transform:scale(1)}
}
.hide{display:none !important}
.split{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.inputRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.search{
  width:100%;
  border:none;
  background:#fff;
  border-radius:16px;
  padding:13px 14px;
  box-shadow:0 10px 20px rgba(24,49,31,.06);
  border:1px solid rgba(24,49,31,.07);
}
select{
  border:none;
  background:#fff;
  border-radius:16px;
  padding:13px 14px;
  box-shadow:0 10px 20px rgba(24,49,31,.06);
  border:1px solid rgba(24,49,31,.07);
}
@media (max-width:920px){
  .grid{grid-template-columns:1fr}
}
@media (max-width:640px){
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .word{font-size:34px}
  .meaning{font-size:16px}
  .split{grid-template-columns:1fr}
  .actions.three{grid-template-columns:1fr}
  .actions{grid-template-columns:1fr}
  .panelHead{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="title">
        <h1>LEAP 英単語学習</h1>
        <div class="sub">理解 → 確認 → 定着 を1つにまとめた学習サイト</div>
      </div>
      <div class="badge" id="statusBadge">Ready</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="k">正答率</div><div class="v" id="rateText">0%</div></div>
      <div class="stat"><div class="k">連続正解</div><div class="v" id="comboText">0</div></div>
      <div class="stat"><div class="k">覚えた語</div><div class="v" id="masteredText">0</div></div>
      <div class="stat"><div class="k">復習待ち</div><div class="v" id="dueText">0</div></div>
    </div>
    <div class="progressWrap"><div class="progressBar" id="progressBar"></div></div>
    <div style="height:10px"></div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-view="learn">学習</button>
      <button class="tab" data-view="test">テスト</button>
      <button class="tab" data-view="review">復習</button>
      <button class="tab" data-view="records">記録</button>
    </div>
  </div>

  <main class="main">
    <div class="grid">
      <section class="panel">
        <div class="panelHead">
          <div>
            <h2 id="viewTitle">学習モード</h2>
            <div class="desc" id="viewDesc">英単語を見て、すぐに確認問題で定着させます。</div>
          </div>
          <div class="inputRow">
            <button class="btn secondary small" id="prevBtn">前へ</button>
            <button class="btn secondary small" id="nextBtn">次へ</button>
            <button class="btn info small" id="shuffleBtn">並べ替え</button>
          </div>
        </div>
        <div class="panelBody">
          <div id="learnView" class="view"></div>
          <div id="testView" class="view hide"></div>
          <div id="reviewView" class="view hide"></div>
          <div id="recordsView" class="view hide"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="panelHead">
          <div>
            <h2>苦手単語ランキング</h2>
            <div class="desc">間違い回数が多い語を優先表示</div>
          </div>
        </div>
        <div class="panelBody">
          <div id="rankList" class="sideList"></div>
          <div style="height:12px"></div>
          <div class="notice" id="hintBox">
            学習カードでは「覚えた」「まだ」を記録できます。テストで間違えた語は自動で復習対象になります。
          </div>
        </div>
      </aside>
    </div>
  </main>
</div>
<div class="answerFlash" id="flash"><div class="mark" id="flashMark">○</div></div>
<script>

function defaultStats(){ return {seen:0, correct:0, wrong:0, wrongCount:0, remembered:false, interval:0, due:0, reps:0, ease:2.2, history:[]}; }
function normalizeStats(raw){
  const out = {};
  for (const item of WORDS){
    const s = raw && raw[item.no] ? raw[item.no] : {};
    out[item.no] = Object.assign(defaultStats(), s);
  }
  return out;
}
function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if (raw && raw.stats) state.stats = normalizeStats(raw.stats);
    if (raw && raw.learnIndex != null) state.learnIndex = raw.learnIndex;
    if (raw && raw.learnOrder && raw.learnOrder.length) state.learnOrder = raw.learnOrder.filter(n => WORDS.some(w => w.no === n));
    if (raw && raw.view) state.view = raw.view;
    if (raw && raw.combo != null) state.combo = raw.combo;
  }catch(e){}
  if (!state.learnOrder.length) state.learnOrder = WORDS.map(w=>w.no);
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    stats: state.stats,
    learnIndex: state.learnIndex,
    learnOrder: state.learnOrder,
    view: state.view,
    combo: state.combo
  }));
}
function getItem(no){ return WORDS[no-1]; }
function getStats(no){
  if (!state.stats[no]) state.stats[no] = defaultStats();
  return state.stats[no];
}
function now(){ return Date.now(); }
function posText(item){ return item.pos || '不明'; }
function stripTags(text){ return text.replace(/^\[[^\]]+\]\s*/, '').trim(); }
function shortMeaning(text){
  const t = stripTags(text);
  const m = t.match(/^(.+?)(?:\s[②③④⑤⑥⑦⑧⑨⑩].*)?$/);
  return (m ? m[1] : t).trim();
}
function exampleSentence(item){
  const w = item.word;
  const p = item.pos || '';
  if (p === '名') return `The ${w} is useful for everyday study.`;
  if (p === '形') return `It was a ${w} answer.`;
  if (p === '副') return `He finished the task ${w}.`;
  if (p === '前') return `We went ${w} the station.`;
  if (p === '接') return `I stayed home, ${w} it was raining.`;
  if (p === '熟') return `She acted ${w} during the meeting.`;
  return `Students can ${w} this word in context.`;
}
function seedShuffle(arr, seed){
  let s = seed || 1;
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    s = (s * 1664525 + 1013904223) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function currentOrder(){
  return state.learnOrder.length ? state.learnOrder : WORDS.map(w=>w.no);
}
function currentWord(){
  const order = currentOrder();
  const no = order[(state.learnIndex % order.length + order.length) % order.length];
  return getItem(no);
}
function queueFromFilter(filter){
  let pool = WORDS.slice();
  if (filter === 'mistakes'){
    pool = pool.filter(w => getStats(w.no).wrongCount > 0);
  }else if (filter === 'due'){
    const t = now();
    pool = pool.filter(w => {
      const s = getStats(w.no);
      return s.remembered === false || !s.due || s.due <= t || s.wrongCount > 0;
    });
  }
  pool.sort((a,b)=>{
    const sa = getStats(a.no), sb = getStats(b.no);
    const aw = sa.wrongCount - sb.wrongCount;
    if (aw !== 0) return aw < 0 ? 1 : -1;
    const ad = (sa.due||0) - (sb.due||0);
    if (ad !== 0) return ad;
    const aa = score(a.no), ab = score(b.no);
    return aa - ab;
  });
  return pool.map(w=>w.no);
}
function score(no){
  const s = getStats(no);
  const seen = Math.max(1, s.seen);
  return s.correct / seen;
}
function mastery(no){
  const s = getStats(no);
  const seen = s.seen;
  const acc = seen ? s.correct / seen : 0;
  return s.remembered || (seen >= 4 && acc >= 0.8 && s.wrongCount <= 1);
}
function updateStats(no, correct, source){
  const s = getStats(no);
  s.seen += 1;
  if (correct){
    s.correct += 1;
    state.combo += 1;
    s.reps = (s.reps || 0) + 1;
    s.interval = s.reps === 1 ? 1 : s.reps === 2 ? 2 : Math.min(90, Math.max(1, Math.round((s.interval || 1) * (s.ease || 2.2))));
    s.ease = Math.min(3.0, (s.ease || 2.2) + 0.06);
    s.due = now() + s.interval * 86400000;
    if (s.wrongCount > 0) s.remembered = s.remembered || s.correct / s.seen >= 0.85;
  }else{
    s.wrong += 1;
    s.wrongCount += 1;
    state.combo = 0;
    s.reps = 0;
    s.interval = 1;
    s.ease = Math.max(1.3, (s.ease || 2.2) - 0.15);
    s.due = now() + 86400000;
    s.remembered = false;
  }
  s.lastSeen = now();
  s.history = (s.history || []).slice(-12);
  s.history.push({t: now(), ok: !!correct, src: source || 'study'});
  state.stats[no] = s;
  save();
  renderHeader();
  renderRank();
}
function playTone(ok){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    if (!window.__ac) window.__ac = new AC();
    const ac = window.__ac;
    if (ac.state === 'suspended') ac.resume();
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = ok ? 880 : 180;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(ok ? 0.16 : 0.22, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (ok ? 0.18 : 0.24));
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + (ok ? 0.2 : 0.26));
    if (ok){
      const o2 = ac.createOscillator();
      const g2 = ac.createGain();
      o2.type = 'triangle'; o2.frequency.value = 1175;
      g2.gain.setValueAtTime(0.0001, t + 0.07);
      g2.gain.exponentialRampToValueAtTime(0.08, t + 0.09);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(t + 0.07); o2.stop(t + 0.22);
    }
  }catch(e){}
}
function flash(ok){
  els.flash.className = 'answerFlash show ' + (ok ? 'correct' : 'wrong');
  els.flashMark.textContent = ok ? '○' : '×';
  setTimeout(()=>{ els.flash.className = 'answerFlash'; }, 640);

function choiceCount(){ return window.innerWidth < 560 ? 2 : 4; }
function sample(pool, n, exclude){
  const arr = pool.filter(x => x !== exclude);
  const shuffled = seedShuffle(arr, Math.floor(Math.random()*999999));
  return shuffled.slice(0, n);
}
function buildOptions(correct, candidates, mapFn){
  const n = choiceCount();
  const pool = candidates.slice();
  const wrongs = sample(pool.map(mapFn), n-1, mapFn(correct));
  const opts = seedShuffle([mapFn(correct), ...wrongs], Math.floor(Math.random()*999999));
  return opts;
}
function generateQuestion(item, mode){
  const typeOptions = ['eng_jp','jp_eng','cloze'];
  const type = mode === 'test' ? typeOptions[Math.floor(Math.random()*typeOptions.length)] :
    (state.studyStage === 'input' ? 'confirm' : 'confirm');
  const cand = WORDS;
  if (type === 'jp_eng' || (mode === 'learn' && state.studyStage === 'quiz')){
    const correct = item.word;
    const choices = buildOptions(correct, cand.map(x=>x.word), x=>x);
    return {
      type:'jp_eng',
      prompt:`${shortMeaning(item.meaning)}`,
      answer:correct,
      choices,
      clue:`${item.no} / ${posText(item)}`,
      kind:'日本語 → 英語'
    };
  }
  if (type === 'cloze' && mode === 'test'){
    const w = item.word;
    const idx = Math.max(1, Math.min(w.length-1, Math.floor(w.length/2)));
    const prompt = w.slice(0, idx) + '_' + w.slice(idx+1);
    return {
      type:'cloze',
      prompt,
      answer:w,
      choices: buildOptions(w, cand.map(x=>x.word), x=>x),
      clue:`${item.no} / ${posText(item)}`,
      kind:'穴埋め'
    };
  }
  // default english -> japanese
  const correct = shortMeaning(item.meaning);
  const choices = buildOptions(correct, cand.map(x=>shortMeaning(x.meaning)), x=>x);
  return {
    type:'eng_jp',
    prompt:item.word,
    answer:correct,
    choices,
    clue:`${item.no} / ${posText(item)}`,
    kind:'英語 → 日本語'
  };
}

  if (view === 'learn'){
    els.viewTitle.textContent = '学習モード';

    els.viewDesc.textContent = '英語→日本語、日本語→英語、穴埋めをランダム出題します。';
    state.testQueue = seedShuffle(WORDS.map(w=>w.no), state.shuffleSeed);
  }else if (view === 'review'){
    els.viewTitle.textContent = '復習モード';
    els.viewDesc.textContent = '間違えた単語を優先し、忘れかけを再出題します。';
  }else{
    els.viewTitle.textContent = '記録';
    els.viewDesc.textContent = '正答率・間違い履歴・苦手ランキングを確認できます。';
  }
  render();
}
function renderHeader(){
  const total = WORDS.length;
  const stats = Object.values(state.stats);
  const seen = stats.filter(s => s.seen > 0).length;
  const mastered = WORDS.filter(w => mastery(w.no)).length;
  const due = WORDS.filter(w => {
    const s = getStats(w.no);
    return s.due && s.due <= now();
  }).length;
  const correct = stats.reduce((a,s)=>a+s.correct,0);
  const seenTotal = stats.reduce((a,s)=>a+s.seen,0);
  const acc = seenTotal ? Math.round(correct / seenTotal * 100) : 0;
  els.rateText.textContent = acc + '%';
  els.comboText.textContent = state.combo;
  els.masteredText.textContent = mastered + '/' + total;
  els.dueText.textContent = due;
  els.progressBar.style.width = Math.max(2, Math.round((mastered/total)*100)) + '%';
  els.statusBadge.textContent = `${seen}/${total} 語を学習`;
}
function renderRank(){
  const arr = WORDS.map(w=>{
    const s = getStats(w.no);
    const acc = s.seen ? Math.round(s.correct / s.seen * 100) : 0;
    return {w,s,acc};
  }).filter(x=>x.s.wrongCount > 0 || x.s.seen > 0);
  arr.sort((a,b)=>{
    if (b.s.wrongCount !== a.s.wrongCount) return b.s.wrongCount - a.s.wrongCount;
    if (a.acc !== b.acc) return a.acc - b.acc;
    return a.w.no - b.w.no;
  });
  els.rankList.innerHTML = arr.slice(0,8).map((x,i)=>`
    <div class="listItem">
      <div>
        <div class="l1">${x.w.word} <span class="mini">#${x.w.no} / ${x.w.pos || '不明'}</span></div>
        <div class="l2">${shortMeaning(x.w.meaning)}</div>
      </div>
      <div class="rank">${x.s.wrongCount}</div>
    </div>
  `).join('') || `<div class="notice">まだ間違い記録がありません。学習を進めると苦手語が自動で並びます。</div>`;
}
function renderLearn(){
  const item = currentWord();
  const st = getStats(item.no);
  const ex = exampleSentence(item);
  const quiz = generateQuestion(item, 'learn');
  state.currentQuiz = quiz;
  els.learnView.innerHTML = `
    <div class="card" id="studyCard">
      <div class="wordNo">
        <div class="noTag">No.${item.no}</div>
        <div class="mini">${st.remembered ? '覚えた' : '学習中'} ・ 正答率 ${st.seen ? Math.round(st.correct/st.seen*100) : 0}%</div>
      </div>
      <div class="word">${item.word}</div>
      <div class="meaning">${item.meaning}</div>
      <div class="metaRow">
        <div class="pill">品詞: ${posText(item)}</div>
        <div class="pill">覚えた語: ${mastery(item.no) ? 'はい' : 'まだ'}</div>
        <div class="pill">復習: ${st.due && st.due <= now() ? '期限到来' : '後で'}</div>
      </div>
      <div class="exampleBox">
        <div class="label">Example</div>
        <div class="ex">${ex}</div>
      </div>
      ${state.studyStage === 'input' ? `
        <div class="actions three">
          <button class="btn secondary" id="markKnow">覚えた</button>
          <button class="btn warn" id="markDont">まだ覚えていない</button>
          <button class="btn primary" id="toQuiz">確認へ</button>
        </div>
      ` : `
        <div class="notice" style="margin-bottom:12px">確認問題: <b>${quiz.kind}</b> / ${quiz.clue}</div>
        <div class="meaning" style="font-size:17px;margin-bottom:10px">${quiz.prompt}</div>
        <div class="choices" id="choiceArea"></div>
        <div class="footerBar">
          <button class="btn secondary small" id="skipQuiz">スキップ</button>
          <button class="btn info small" id="backToInput">戻る</button>
        </div>
      `}
    </div>
  `;
  if (state.studyStage === 'input'){
    document.getElementById('markKnow').onclick = ()=>{ getStats(item.no).remembered = true; save(); renderHeader(); renderLearn(); renderRank(); };
    document.getElementById('markDont').onclick = ()=>{ getStats(item.no).remembered = false; save(); renderHeader(); renderLearn(); renderRank(); };
    document.getElementById('toQuiz').onclick = ()=>{
      state.studyStage = 'quiz';
      save();
      renderLearn();
    };
  }else{
    const area = document.getElementById('choiceArea');
    area.innerHTML = quiz.choices.map(c=>`<button class="choice" data-choice="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');
    [...area.querySelectorAll('.choice')].forEach(btn=>{
      btn.onclick = ()=>answerQuiz(btn.dataset.choice, item.no, quiz.answer, 'learn');
    });
    document.getElementById('skipQuiz').onclick = ()=>nextLearn();
    document.getElementById('backToInput').onclick = ()=>{ state.studyStage='input'; renderLearn(); };
  }
  attachSwipe(document.getElementById('studyCard'), ()=>nextLearn(), ()=>prevLearn());
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function answerQuiz(choice, no, answer, source){
  const ok = choice === answer;
  updateStats(no, ok, source);
  playTone(ok);
  flash(ok);
  const btns = document.querySelectorAll('.choice');
  btns.forEach(b=>{
    b.disabled = true;
    if (b.dataset.choice === answer) b.classList.add('correct');
    if (!ok && b.dataset.choice === choice) b.classList.add('wrong');
  });
  state.studyStage = 'input';
  state.currentQuiz = null;
  save();
  setTimeout(()=>nextLearn(), ok ? 700 : 900);
}
function nextLearn(){
  state.learnIndex = (state.learnIndex + 1) % currentOrder().length;
  state.studyStage = 'input';
  state.currentQuiz = null;
  save();
  renderLearn();
  renderHeader();
}
function prevLearn(){
  state.learnIndex = (state.learnIndex - 1 + currentOrder().length) % currentOrder().length;
  state.studyStage = 'input';
  state.currentQuiz = null;
  save();
  renderLearn();
  renderHeader();
}
function renderTest(){
  if (!state.testQueue.length) state.testQueue = seedShuffle(WORDS.map(w=>w.no), Math.floor(Math.random()*999999));
  const no = state.testQueue[0];
  const item = getItem(no);
  const q = state.currentQuiz && state.currentQuiz.mode === 'test' ? state.currentQuiz : generateQuestion(item, 'test');
  state.currentQuiz = Object.assign({mode:'test', no}, q);
  els.testView.innerHTML = `
    <div class="card" id="testCard">
      <div class="wordNo">
        <div class="noTag">テスト</div>
        <div class="mini">${state.testCorrect}/${state.testCount} 正解 ・ 連続 ${state.combo}</div>
      </div>
      <div class="notice">${q.kind} / ${q.clue}</div>
      <div style="height:10px"></div>
      <div class="word" style="font-size:34px">${escapeHtml(q.prompt)}</div>
      <div class="choices" id="testChoices"></div>
      <div class="footerBar">
        <button class="btn secondary small" id="nextTestWord">次の問題</button>
        <button class="btn info small" id="shuffleTest">出題を混ぜる</button>
      </div>
    </div>
  `;
  const area = document.getElementById('testChoices');
  area.innerHTML = q.choices.map(c=>`<button class="choice" data-choice="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');
  [...area.querySelectorAll('.choice')].forEach(btn=>{
    btn.onclick = ()=>answerTest(btn.dataset.choice, no, q.answer);
  });
  document.getElementById('nextTestWord').onclick = ()=>nextTest(false);
  document.getElementById('shuffleTest').onclick = ()=>{ state.testQueue = seedShuffle(WORDS.map(w=>w.no), Math.floor(Math.random()*999999)); state.currentQuiz=null; renderTest(); };
  attachSwipe(document.getElementById('testCard'), ()=>nextTest(true), ()=>{});
}
function answerTest(choice, no, answer){
  const ok = choice === answer;
  state.testCount += 1;
  if (ok) state.testCorrect += 1;
  updateStats(no, ok, 'test');
  playTone(ok);
  flash(ok);
  const btns = document.querySelectorAll('#testChoices .choice');
  btns.forEach(b=>{
    b.disabled = true;
    if (b.dataset.choice === answer) b.classList.add('correct');
    if (!ok && b.dataset.choice === choice) b.classList.add('wrong');
  });
  save();
  renderHeader();
  renderRank();
}
function nextTest(advanceOnly){
  if (state.testQueue.length) state.testQueue.shift();
  state.currentQuiz = null;
  if (!state.testQueue.length) state.testQueue = seedShuffle(WORDS.map(w=>w.no), Math.floor(Math.random()*999999));
  renderTest();
}
function renderReview(){
  const filter = state.reviewFilter;
  let pool = WORDS.slice();
  if (filter === 'mistakes'){
    pool = pool.filter(w=>getStats(w.no).wrongCount > 0);
  }else if (filter === 'due'){
    pool = pool.filter(w=>getStats(w.no).due && getStats(w.no).due <= now());
  }else{
    pool = pool.filter(w=>getStats(w.no).wrongCount > 0 || getStats(w.no).seen > 0);
  }
  pool.sort((a,b)=>{
    const sa = getStats(a.no), sb = getStats(b.no);
    if (sb.wrongCount !== sa.wrongCount) return sb.wrongCount - sa.wrongCount;
    const ac = sa.seen ? sa.correct/sa.seen : 0;
    const bc = sb.seen ? sb.correct/sb.seen : 0;
    if (ac !== bc) return ac - bc;
    return (sa.due||0) - (sb.due||0);
  });
  const item = pool[0] || WORDS[0];
  const st = getStats(item.no);
  const q = generateQuestion(item, 'test');
  els.reviewView.innerHTML = `
    <div class="card" id="reviewCard">
      <div class="wordNo">
        <div class="noTag">復習 ${filter}</div>
        <div class="mini">${pool.length} 語</div>
      </div>
      <div class="inputRow" style="margin-bottom:10px">
        <button class="btn ${filter==='due'?'primary':'secondary'} small" data-filter="due">期限が来た語</button>
        <button class="btn ${filter==='mistakes'?'primary':'secondary'} small" data-filter="mistakes">間違えた語だけ</button>
        <button class="btn ${filter==='all'?'primary':'secondary'} small" data-filter="all">学習済み全部</button>
      </div>
      ${pool.length ? `
        <div class="word" style="font-size:32px">${escapeHtml(item.word)}</div>
        <div class="meaning">${escapeHtml(item.meaning)}</div>
        <div class="metaRow">
          <div class="pill">正答率 ${st.seen ? Math.round(st.correct/st.seen*100) : 0}%</div>
          <div class="pill">間違い ${st.wrongCount}</div>
          <div class="pill">次回 ${st.due ? new Date(st.due).toLocaleDateString() : '未設定'}</div>
        </div>
        <div class="notice">復習クイズ: ${q.kind}</div>
        <div style="height:10px"></div>
        <div class="word" style="font-size:28px">${escapeHtml(q.prompt)}</div>
        <div class="choices" id="reviewChoices"></div>
        <div class="footerBar">
          <button class="btn secondary small" id="reviewKnow">わかった</button>
          <button class="btn warn small" id="reviewDont">まだ</button>
        </div>
      ` : `<div class="notice">復習対象がまだありません。学習やテストで間違えた単語がここに集まります。</div>`}
    </div>
  `;
  [...els.reviewView.querySelectorAll('[data-filter]')].forEach(btn=>{
    btn.onclick = ()=>{ state.reviewFilter = btn.dataset.filter; renderReview(); };
  });
  if (!pool.length) return;
  const area = document.getElementById('reviewChoices');
  area.innerHTML = q.choices.map(c=>`<button class="choice" data-choice="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');
  [...area.querySelectorAll('.choice')].forEach(btn=>{
    btn.onclick = ()=>answerReview(btn.dataset.choice, item.no, q.answer);
  });
  document.getElementById('reviewKnow').onclick = ()=>{ getStats(item.no).remembered = true; save(); renderHeader(); renderRank(); renderReview(); };
  document.getElementById('reviewDont').onclick = ()=>{ getStats(item.no).remembered = false; save(); renderHeader(); renderRank(); renderReview(); };
  attachSwipe(document.getElementById('reviewCard'), ()=>{}, ()=>{});
}
function answerReview(choice, no, answer){
  const ok = choice === answer;
  updateStats(no, ok, 'review');
  playTone(ok);
  flash(ok);
  renderHeader();
  renderRank();
  setTimeout(()=>renderReview(), ok ? 650 : 900);
}
function renderRecords(){
  const stats = WORDS.map(w=>{
    const s = getStats(w.no);
    const acc = s.seen ? Math.round(s.correct/s.seen*100) : 0;
    return {item:w, s, acc};
  }).filter(x=>x.s.seen > 0);
  stats.sort((a,b)=>a.acc-b.acc || b.s.wrongCount-a.s.wrongCount);
  const best = stats.slice().sort((a,b)=>b.acc-a.acc).slice(0,8);
  const worst = stats.slice(0,12);
  els.recordsView.innerHTML = `
    <div class="split">
      <div class="card">
        <div class="wordNo"><div class="noTag">成績</div><div class="mini">学習の見える化</div></div>
        <div class="metaRow">
          <div class="pill">学習済み ${stats.length}</div>
          <div class="pill">総正解 ${Object.values(state.stats).reduce((a,s)=>a+s.correct,0)}</div>
          <div class="pill">総誤答 ${Object.values(state.stats).reduce((a,s)=>a+s.wrong,0)}</div>
        </div>
        <div class="notice">上位の単語は正答率が高い語、下位は苦手語です。繰り返し見ると自動で復習間隔が伸びます。</div>
      </div>
      <div class="card">
        <div class="wordNo"><div class="noTag">操作</div><div class="mini">管理ボタン</div></div>
        <div class="actions three">
          <button class="btn secondary" id="resetProgress">進捗を初期化</button>
          <button class="btn info" id="exportProgress">保存を書き出し</button>
          <button class="btn warn" id="importProgress">保存を読み込み</button>
        </div>
      </div>
    </div>
    <div style="height:12px"></div>
    <div class="split">
      <div class="card">
        <div class="wordNo"><div class="noTag">強い語</div><div class="mini">正答率上位</div></div>
        <div class="sideList">${best.map((x,i)=>renderRecordItem(x,i+1)).join('')}</div>
      </div>
      <div class="card">
        <div class="wordNo"><div class="noTag">弱い語</div><div class="mini">正答率下位</div></div>
        <div class="sideList">${worst.map((x,i)=>renderRecordItem(x,i+1)).join('')}</div>
      </div>
    </div>
  `;
  document.getElementById('resetProgress').onclick = ()=>{
    if (!confirm('進捗を初期化しますか？')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  };
  document.getElementById('exportProgress').onclick = ()=>{
    const txt = JSON.stringify({stats: state.stats, learnIndex: state.learnIndex, learnOrder: state.learnOrder}, null, 2);
    navigator.clipboard.writeText(txt).then(()=>alert('保存データをコピーしました'));
  };
  document.getElementById('importProgress').onclick = ()=>{
    const txt = prompt('保存データ(JSON)を貼り付けてください');
    if (!txt) return;
    try{
      const obj = JSON.parse(txt);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.assign({stats:{}}, obj)));
      location.reload();
    }catch(e){ alert('JSONの形式が正しくありません'); }
  };
}
function renderRecordItem(x, rank){
  return `
    <div class="listItem">
      <div>
        <div class="l1">#${x.item.no} ${x.item.word} <span class="mini">/ ${x.item.pos || '不明'}</span></div>
        <div class="l2">正答率 ${x.acc}% ・ 間違い ${x.s.wrongCount} ・ ${shortMeaning(x.item.meaning)}</div>
      </div>
      <div class="rank">${rank}</div>
    </div>`;
}
function render(){
  renderHeader();
  renderRank();
  if (state.view === 'learn') renderLearn();
  if (state.view === 'test') renderTest();
  if (state.view === 'review') renderReview();
  if (state.view === 'records') renderRecords();
  save();
}
function attachSwipe(el, onLeft, onRight){
  if (!el) return;
  let x0 = null, y0 = null, moved = false;
  el.ontouchstart = e => { const t = e.changedTouches[0]; x0 = t.clientX; y0 = t.clientY; moved = false; };
  el.ontouchmove = e => { moved = true; };
  el.ontouchend = e => {
    if (x0 == null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - x0;
    const dy = t.clientY - y0;
    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){
      if (dx < 0 && onLeft) onLeft();
      if (dx > 0 && onRight) onRight();
    }
    x0 = y0 = null;
  };
}
document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab');
  if (!btn) return;
  setView(btn.dataset.view);
});
els.prevBtn.onclick = ()=> state.view === 'learn' ? prevLearn() : state.view === 'test' ? nextTest(true) : render();
els.nextBtn.onclick = ()=> {
  if (state.view === 'learn'){
    if (state.studyStage === 'input') { state.studyStage = 'quiz'; renderLearn(); }
    else nextLearn();
  }else if (state.view === 'test'){
    nextTest(true);
  }else if (state.view === 'review'){
    renderReview();
  }else{
    renderRecords();
  }
};
els.shuffleBtn.onclick = ()=>{
  if (state.view === 'learn'){
    state.learnOrder = seedShuffle(WORDS.map(w=>w.no), Math.floor(Math.random()*999999));
    state.learnIndex = 0;
    state.studyStage = 'input';
    renderLearn();
  }else if (state.view === 'test'){
    state.testQueue = seedShuffle(WORDS.map(w=>w.no), Math.floor(Math.random()*999999));
    state.currentQuiz = null;
    renderTest();
  }else if (state.view === 'review'){
    state.reviewFilter = 'mistakes';
    renderReview();
  }else{
    state.stats = normalizeStats({});
    save();
    render();
  }
};
window.addEventListener('keydown', e=>{
  if (e.key === 'ArrowRight') els.nextBtn.click();
  if (e.key === 'ArrowLeft') els.prevBtn.click();
  if (e.key === ' ' && state.view === 'learn') { e.preventDefault(); if (state.studyStage === 'input') { state.studyStage = 'quiz'; renderLearn(); } }
});
window.addEventListener('resize', ()=>{ if (state.view === 'learn') renderLearn(); if (state.view === 'test') renderTest(); if (state.view === 'review') renderReview(); });
load();
state.stats = normalizeStats(state.stats);
render();
setView(state.view || 'learn');
</script>
</body>
</html>
